name: Build Docker Image

on:
  push:
    branches:
      - staging
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}


    - name: Build image
      run: |
        docker build \
        -t ghcr.io/${{ github.repository }}/laravel-backend:${{ github.sha }} .


    - name: Push image
      run: |
        docker push ghcr.io/${{ github.repository }}/laravel-backend:${{ github.sha }}