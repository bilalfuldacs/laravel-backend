name: Build and Push Docker Image

on:
  push:
    branches:
      - staging
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/laravel-backend

          docker build \
            -t ghcr.io/${{ github.repository_owner }}/laravel-backend:${{ github.sha }} \
            -t ghcr.io/${{ github.repository_owner }}/laravel-backend:${{ github.ref_name }} .

          docker push ghcr.io/${{ github.repository_owner }}/laravel-backend:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/laravel-backend:${{ github.ref_name }}